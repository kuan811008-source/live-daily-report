<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>主管彙整後台 · 直播團隊每日回報</title>
<style>
:root{--ink:#1e293b;--muted:#64748b;--line:#e2e8f0;--brand:#1f6b6b;--brand2:#2f759c;--accent:#0ea5e9;
 --done:#16a34a;--doneBg:#dcfce7;--fail:#dc2626;--failBg:#fee2e2;--shadow:0 1px 3px rgba(15,23,42,.08);}
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:#f1f5f9;color:var(--ink)}
.wrap{max-width:1100px;margin:0 auto;padding:0 14px 80px}
header.top{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:16px;border-radius:0 0 18px 18px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
header.top h1{margin:0;font-size:18px}
.card{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:16px;margin:14px 0}
.btn{font:inherit;font-size:13px;font-weight:700;border:none;border-radius:10px;padding:9px 13px;cursor:pointer}
.btn.brand{background:var(--brand);color:#fff}.btn.soft{background:#eef2f7;color:var(--ink)}.btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--line)}
.btn:active{transform:translateY(1px)}
input,select{font:inherit;font-size:14px;background:#f8fafc;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px}
input:focus,select:focus{outline:none;border-color:var(--accent);background:#fff}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls label{font-size:12px;color:var(--muted);font-weight:700;display:flex;flex-direction:column;gap:4px}
h2{font-size:15px;margin:0 0 10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:center}
th{background:#f1f5f9;position:sticky;top:0}
td.l,th.l{text-align:left}
.pill{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:#eef2f7;color:var(--brand)}
.rate{font-weight:800}
.rate.good{color:var(--done)}.rate.bad{color:var(--fail)}
.ded{color:var(--fail);font-weight:800}
.del{background:none;border:none;color:var(--fail);cursor:pointer;font-weight:700;font-size:12px}
.fails{font-size:11.5px;color:var(--muted);text-align:left;max-width:280px}
.tablewrap{overflow:auto;max-height:60vh;border-radius:10px;border:1px solid var(--line)}
.note{font-size:12px;color:var(--muted)}
.map{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px}
.map span{font-size:11.5px;background:#f0fdfa;border:1.5px solid #99f6e4;border-radius:999px;padding:3px 10px}
.empty{text-align:center;color:var(--muted);padding:26px;font-size:13px}
/* login */
#login{max-width:360px;margin:60px auto}
#login .card{text-align:center}
#login input{width:100%;margin:10px 0;text-align:center}
.view{background:none;border:1.5px solid var(--line);color:var(--brand);border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;padding:3px 8px;margin-right:4px}
.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:80;overflow:auto;padding:24px}
.modal.show{display:block}
.modalbox{max-width:760px;margin:0 auto;background:#fff;border-radius:14px;padding:20px;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.modalclose{position:absolute;top:8px;right:12px;border:none;background:none;font-size:26px;cursor:pointer;color:var(--muted);line-height:1}
.dsec{margin:14px 0}
.dsec h3{font-size:14px;margin:0 0 6px;color:var(--brand);border-bottom:2px solid var(--line);padding-bottom:4px}
.dmeta{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;margin-bottom:6px}
.dmeta b{color:var(--brand2)}
.dcat{font-weight:800;font-size:12.5px;background:#f1f5f9;padding:4px 8px;margin-top:8px;border-radius:6px}
.ditem{display:flex;justify-content:space-between;gap:10px;padding:5px 8px;border-bottom:1px solid #f1f5f9;font-size:13px}
.ditem .dq{flex:1;text-align:left}
.dv{font-weight:700;white-space:nowrap}
.dv.done{color:var(--done)}.dv.fail{color:var(--fail)}.dv.partial{color:#d97706}.dv.na{color:#64748b}.dv.idle{color:#94a3b8}
.dcard{border:1.5px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;font-size:13px;text-align:left}
.dcard .t{font-weight:800;color:var(--brand)}
.dempty{color:var(--muted);font-size:13px;padding:6px}
.dedrow{display:flex;gap:6px;align-items:center;margin:5px 0;flex-wrap:wrap}
.dedrow select{font-size:12.5px;padding:6px 8px;max-width:210px}
.dedrow input{font-size:12.5px;padding:6px 8px}
.dedrow .rs{flex:1;min-width:130px}
.dedx{background:none;border:none;color:var(--fail);cursor:pointer;font-size:18px;line-height:1}
.dnote{display:block;font-size:11.5px;color:var(--brand2);margin-top:3px;white-space:pre-wrap}
.rvrow{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}
.rvrow input{width:100px;font-size:13px;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px}
.rvl{font-size:12.5px;font-weight:700;color:var(--muted);margin-top:8px}
.rvta{width:100%;min-height:52px;font:inherit;font-size:13px;border:1.5px solid var(--line);border-radius:8px;padding:7px 9px;margin-top:4px;resize:vertical}
.rvta:focus,.rvrow input:focus{outline:none;border-color:var(--accent)}
.rvlock{font-size:12.5px;color:var(--fail);background:var(--failBg);border-radius:8px;padding:7px 10px;margin:4px 0 8px;font-weight:600}
.rvhint{font-size:12px;color:var(--brand2);margin:2px 0 8px}
.rvro{font-size:13px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:7px 9px;margin-top:4px;white-space:pre-wrap;min-height:18px}
.tpltabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tpltab{font:inherit;font-size:13px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:6px 14px;cursor:pointer}
.tpltab.on{background:var(--brand);border-color:var(--brand);color:#fff}
.tplnav{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:8px}
.tplnavrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tplnavlbl{font-size:12px;font-weight:800;color:var(--muted);min-width:34px}
.tpltab.mini{padding:4px 9px;font-size:12px}
.tpltab.add{border-style:dashed;color:var(--brand)}
.tpltab.rm{color:#c0392b;border-color:#f0c4bd}
.btn.sm{padding:6px 10px;font-size:12px}
.tplnote{font-size:12px;color:var(--muted);background:#f8fafc;border-left:3px solid var(--brand2);padding:7px 10px;border-radius:0 8px 8px 0;margin-bottom:10px}
.tplitem{border:1.5px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;background:#fcfdff}
.draghandle{cursor:grab;font-size:17px;color:var(--muted);padding:2px 6px;user-select:none;border:1.5px solid var(--line);border-radius:8px;background:#fff}
.draghandle:active{cursor:grabbing}
.tplitem.dragover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.tplr{display:flex;gap:6px;align-items:center;margin:5px 0;flex-wrap:wrap}
.in{font:inherit;font-size:13px;background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:7px 9px}
.in:focus{outline:none;border-color:var(--accent)}
.tqa{width:100%;min-height:46px;resize:vertical;margin:5px 0}
.num{width:78px}
.tplact{display:flex;gap:6px;margin-top:6px}
.tplact button{font:inherit;font-size:12px;font-weight:700;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:4px 10px;cursor:pointer}
.tplact .rm{color:var(--fail);border-color:#fecaca;margin-left:auto}
.tthr{font-size:12.5px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="login" style="display:none">
  <div class="card">
    <h2>主管後台登入</h2>
    <p class="note">請輸入後台密碼（預設 admin123）</p>
    <input type="password" id="pw" placeholder="後台密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn brand" style="width:100%" onclick="doLogin()">登入</button>
    <p class="note" id="loginErr" style="color:var(--fail)"></p>
  </div>
</div>

<div id="app" style="display:none">
  <header class="top">
    <h1>📊 主管彙整後台 · 直播團隊每日回報</h1>
    <button class="btn soft" onclick="logout()">登出</button>
  </header>
  <div class="wrap">
    <div class="card">
      <div class="controls">
        <label>月份 <input type="month" id="fMonth"></label>
        <label>崗位
          <select id="fPos"><option value="">全部</option><option>運營</option><option>小編</option><option>群控</option></select>
        </label>
        <button class="btn brand" onclick="load()">🔄 重新整理</button>
        <button class="btn ghost" onclick="exportCsv()">⬇️ 匯出 CSV</button>
        <button class="btn ghost" onclick="openTplEditor()">📝 編輯回報表內容</button>
        <span class="note" id="count"></span>
      </div>
    </div>

    <div class="card">
      <h2>月度彙總（每人）— 直接接月度考核</h2>
      <div class="map">
        <span>平均每日完成率 → 軸一執行</span>
        <span>互助件數 → 軸二互助</span>
        <span>本月扣分合計（封頂 −30）→ 職責扣分</span>
      </div>
      <div class="tablewrap"><table id="sumTbl"></table></div>
    </div>

    <div class="card">
      <h2>每日填答明細</h2>
      <div class="tablewrap"><table id="detTbl"></table></div>
    </div>
  </div>
</div>

<div id="detailModal" class="modal" onclick="if(event.target===this)closeDetail()">
  <div class="modalbox">
    <button class="modalclose" onclick="closeDetail()">×</button>
    <div id="detailBody"></div>
  </div>
</div>
<div id="tplModal" class="modal" onclick="if(event.target===this)closeTpl()">
  <div class="modalbox">
    <button class="modalclose" onclick="closeTpl()">×</button>
    <h2 style="margin:0 0 8px;font-size:17px">📝 編輯回報表內容</h2>
    <div id="tplBody"></div>
    <div style="position:sticky;bottom:0;background:#fff;padding:10px 0 2px;margin-top:10px;border-top:1px solid var(--line);display:flex;gap:8px">
      <button class="btn brand" onclick="saveTpl()">💾 儲存</button>
      <button class="btn soft" onclick="closeTpl()">關閉</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const POS_ORDER={運營:1,小編:2,群控:3};
let subsById={};
let editId=null,editDeds=[];
const VIOLATIONS=["排期未準時","未完成價格對標/未截圖","未做商品實測","QA未整理/未更新","白板與主播不一致","直播預告未準時","種草/預熱影片未達標","影片置入不符行銷規範","設備未清點/播出中斷","廣告投放未照規範","置頂五項不齊","購物車審核未準時","炒群未達標","開播通知未同步","搖人訊息不足/重複","限動則數未達標","下播1小時內未彙整","數據回報不完整","客服未清空","留言數未達標","群控內容不符/洗版","公告自介未更新","負面留言未準時刪","截圖未準時提交","反饋留言未達標","貼文未準時發佈","連結未放留言區","主管交辦未完成","其他(見備註)"];
function $(id){return document.getElementById(id);}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function thisMonth(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}

async function check(){
  const r=await fetch('/api/admin/check');const j=await r.json();
  if(j.isAdmin){showApp();}else{$("login").style.display="block";$("app").style.display="none";}
}
async function doLogin(){
  const pw=$("pw").value;
  const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(r.ok){showApp();}else{$("loginErr").textContent="密碼錯誤";}
}
async function logout(){await fetch('/api/admin/logout',{method:'POST'});location.reload();}
function showApp(){$("login").style.display="none";$("app").style.display="block";if(!$("fMonth").value)$("fMonth").value=thisMonth();load();}

async function load(){
  const m=$("fMonth").value;const pos=$("fPos").value;
  const r=await fetch('/api/admin/data?month='+encodeURIComponent(m)+(pos?'&pos='+encodeURIComponent(pos):''));
  if(r.status===401){check();return;}
  const j=await r.json();
  renderSummary(j.summary);renderDetail(j.submissions);
  $("count").textContent="共 "+j.submissions.length+" 筆填答";
}

function renderSummary(sum){
  const t=$("sumTbl");
  if(!sum.length){t.innerHTML="<tr><td class='empty'>本月尚無資料</td></tr>";return;}
  sum.sort((a,b)=>(POS_ORDER[a.pos]-POS_ORDER[b.pos])||a.name.localeCompare(b.name));
  let h="<tr><th class='l'>崗位</th><th class='l'>姓名</th><th>已填天數</th><th>平均每日完成率<br><span class='note'>軸一執行</span></th><th>互助件數<br><span class='note'>軸二互助</span></th><th>本月扣分合計<br><span class='note'>職責扣分</span></th><th>主管評分<br><span class='note'>月均</span></th></tr>";
  sum.forEach(s=>{
    h+="<tr><td class='l'><span class='pill'>"+s.pos+"</span></td><td class='l'>"+esc(s.name)+"</td><td>"+s.days+"</td>"+
       "<td class='rate "+(s.avgRate>=75?'good':s.avgRate<60?'bad':'')+"'>"+s.avgRate+"%</td>"+
       "<td>"+s.helps+"</td><td class='ded'>"+(s.ded||0)+"</td><td class='rate "+(s.avgScore!=null&&s.avgScore>=75?'good':s.avgScore!=null&&s.avgScore<60?'bad':'')+"'>"+(s.avgScore!=null?s.avgScore:'—')+"</td></tr>";
  });
  t.innerHTML=h;
}
function renderDetail(subs){
  const t=$("detTbl");
  subsById={}; subs.forEach(s=>subsById[s.id]=s);
  if(!subs.length){t.innerHTML="<tr><td class='empty'>本月尚無填答</td></tr>";return;}
  let h="<tr><th>日期</th><th>崗位</th><th class='l'>姓名</th><th>IP</th><th>完成率</th><th>數字達標</th><th>互助</th><th>扣分</th><th class='l'>未完成/部分項目</th><th></th></tr>";
  subs.forEach(s=>{
    const m=s.metrics||{};
    h+="<tr><td>"+s.date+"</td><td><span class='pill'>"+s.pos+"</span></td><td class='l'>"+esc(s.name)+"</td><td>"+esc(s.ip||'')+"</td>"+
       "<td class='rate "+(m.rate>=75?'good':m.rate<60?'bad':'')+"'>"+(m.denom>0?m.rate+'%':'—')+"</td>"+
       "<td>"+(m.numTot?m.numOk+'/'+m.numTot:'—')+"</td><td>"+(m.helpCount||0)+"</td>"+
       "<td class='"+(m.dedTotal<0?'ded':'')+"'>"+(m.dedTotal||'')+"</td>"+
       "<td class='fails'>"+esc((s.fails||[]).join('、'))+"</td>"+
       "<td style='white-space:nowrap'><button class='view' onclick=\"openDetail('"+s.id+"')\">詳情</button><button class='del' onclick=\"del('"+s.id+"')\">刪除</button></td></tr>";
  });
  t.innerHTML=h;
}
async function del(id){
  if(!confirm("確定刪除這筆填答？刪除後該同事才能重新送出當日回報。"))return;
  await fetch('/api/admin/submission?id='+encodeURIComponent(id),{method:'DELETE'});
  toast("已刪除");closeDetail();load();
}
function openDetail(id){
  const s=subsById[id]; if(!s)return; const m=s.metrics||{};
  let h="<h2 style='margin:0 0 10px;font-size:17px'>填答詳情</h2>";
  h+="<div class='dmeta'><span>崗位：<b>"+esc(s.pos)+"</b></span><span>姓名：<b>"+esc(s.name)+"</b></span><span>IP：<b>"+esc(s.ip||'')+"</b></span><span>日期：<b>"+esc(s.date)+"</b></span><span class='pill'>"+esc(s.day||(s.live?'直播日':'非直播日'))+"</span></div>";
  h+="<div class='dmeta'><span>完成率：<b>"+(m.denom>0?m.rate+'%':'—')+"</b></span><span>數字達標："+(m.numTot?m.numOk+'/'+m.numTot:'—')+"</span><span>互助："+(m.helpCount||0)+" 件</span><span>扣分："+(m.dedTotal||0)+"</span><span style='color:var(--muted)'>送出："+esc((s.receivedAt||'').replace('T',' ').slice(0,16))+"</span></div>";
  h+="<div class='dsec'><h3>第一部分　每日工作勾選</h3>";
  if(s.lines&&s.lines.length){var lastSec=null;s.lines.forEach(function(ln){if(ln.sec!==lastSec){h+="<div class='dcat'>"+esc(ln.sec)+"</div>";lastSec=ln.sec;}var cls;if(ln.v==='不適用')cls='na';else if(ln.v==='未填')cls='idle';else if(ln.v==='完成')cls='done';else if(ln.v==='部分')cls='partial';else if(ln.v==='未完成')cls='fail';else if(ln.v.indexOf('%')>=0){var pn=parseInt(ln.v);cls=pn>=100?'done':pn>0?'partial':'fail';}else cls=ln.v.indexOf('✓')>=0?'done':ln.v.indexOf('✗')>=0?'fail':'idle';h+="<div class='ditem'><span class='dq'>"+esc(ln.q)+(ln.note?"<span class='dnote'>備註："+esc(ln.note)+"</span>":"")+"</span><span class='dv "+cls+"'>"+esc(ln.v)+"</span></div>";});}
  else{h+="<div class='ditem'><span class='dq'>未完成/部分項目</span><span>"+esc((s.fails||[]).join('、')||'（無）')+"</span></div>";if((s.nums||[]).length)h+="<div class='ditem'><span class='dq'>數字項</span><span>"+esc(s.nums.join('、'))+"</span></div>";h+="<div class='dempty'>（此筆為舊版資料，無逐項明細）</div>";}
  h+="</div>";
  if((s.custom||[]).length){h+="<div class='dsec'><h3>自訂當日工作項目</h3>";s.custom.forEach(function(t){var p=Number(t.pct)||0;var c=p>=100?'done':p>0?'partial':'fail';h+="<div class='ditem'><span class='dq'>"+esc(t.q||'')+(t.note?"<span class='dnote'>備註："+esc(t.note)+"</span>":"")+"</span><span class='dv "+c+"'>"+p+"%</span></div>";});h+="</div>";}
  h+="<div class='dsec'><h3>第二部分　互助事蹟</h3>";
  if((s.helps||[]).length){s.helps.forEach(function(x){h+="<div class='dcard'><div class='t'>"+esc(x.type||'')+"</div>"+(x.who?"<div>對象/教學："+esc(x.who)+"</div>":"")+(x.content?"<div>內容："+esc(x.content)+"</div>":"")+(x.result?"<div>完成度/成效："+esc(x.result)+"</div>":"")+"</div>";});}else{h+="<div class='dempty'>（無）</div>";}
  h+="</div>";
  h+="<div class='dsec'><h3>第三部分　主管扣分（主管操作）</h3><div id='dedEditArea'></div></div>";
  var rv=s.review||{};
  var rvDeadline=new Date(s.receivedAt||0).getTime()+24*3600*1000;
  var rvLocked=Date.now()>rvDeadline;
  h+="<div class='dsec'><h3>主管評分／回饋（主管操作）"+(rvLocked?" 🔒 已鎖定":"")+"</h3>";
  if(rvLocked){
    h+="<div class='rvlock'>🔒 此回報送出已超過 24 小時，主管評分/回饋已鎖定、無法再編輯。</div>";
    h+="<div class='rvrow'><span>主管評分：</span><b>"+(rv.score!=null&&rv.score!==''?rv.score:'—')+"</b></div>";
    h+="<div class='rvl'>亮點／做得好</div><div class='rvro'>"+(esc(rv.good||'')||'—')+"</div>";
    h+="<div class='rvl'>待加強／提醒</div><div class='rvro'>"+(esc(rv.improve||'')||'—')+"</div>";
    h+="<div class='rvl'>主管總評／回饋</div><div class='rvro'>"+(esc(rv.comment||'')||'—')+"</div>";
  }else{
    h+="<div class='rvhint'>⏳ 可編輯至 <b>"+fmtWhen(rvDeadline)+"</b>（回報送出後 24 小時內），逾時自動鎖定。</div>";
    h+="<div class='rvrow'><span>主管評分（0–100）：</span><input id='rvScore' type='number' min='0' max='100' value=\""+esc(rv.score==null?'':String(rv.score))+"\"></div>";
    h+="<div class='rvl'>亮點／做得好</div><textarea id='rvGood' class='rvta'>"+esc(rv.good||'')+"</textarea>";
    h+="<div class='rvl'>待加強／提醒</div><textarea id='rvImprove' class='rvta'>"+esc(rv.improve||'')+"</textarea>";
    h+="<div class='rvl'>主管總評／回饋</div><textarea id='rvComment' class='rvta'>"+esc(rv.comment||'')+"</textarea>";
    h+="<button class='btn brand' style='margin-top:8px' onclick='saveReview()'>💾 儲存評分/回饋</button>";
  }
  h+="</div>";
  $("detailBody").innerHTML=h; $("detailModal").classList.add("show");
  editId=id; editDeds=JSON.parse(JSON.stringify(s.deds||[])); renderEditDeds();
}
function renderEditDeds(){
  var box=$("dedEditArea"); if(!box)return; var h="";
  editDeds.forEach(function(d,i){
    var opts="<option value=''>—違反項目—</option>"+VIOLATIONS.map(function(v){return "<option"+(d.item===v?" selected":"")+">"+esc(v)+"</option>";}).join("");
    h+="<div class='dedrow'><select onchange=\"updateDed("+i+",'item',this.value)\">"+opts+"</select>";
    h+="<input type='text' class='rs' placeholder='原因/說明' value=\""+esc(d.reason||'')+"\" oninput=\"updateDed("+i+",'reason',this.value)\">";
    h+="<input type='number' step='3' style='width:64px' value='"+(d.pts!=null?d.pts:-3)+"' oninput=\"updateDed("+i+",'pts',this.value)\">";
    h+="<button class='dedx' title='移除' onclick='removeDedRow("+i+")'>×</button></div>";
  });
  var tot=Math.max(-30,editDeds.reduce(function(a,d){return a+(Number(d.pts)||0);},0));
  h+="<div style='margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap'><button class='btn ghost' onclick='addDedRow()'>＋ 新增扣分</button><button class='btn brand' onclick='saveDeds()'>💾 儲存扣分</button><span style='font-size:12px;color:var(--muted)'>合計 "+tot+"（單月上限 −30）</span></div>";
  box.innerHTML=h;
}
function addDedRow(){editDeds.push({item:'',reason:'',pts:-3});renderEditDeds();}
function removeDedRow(i){editDeds.splice(i,1);renderEditDeds();}
function updateDed(i,f,v){if(editDeds[i])editDeds[i][f]=(f==='pts'?Number(v):v);}
async function saveDeds(){
  var deds=editDeds.filter(function(d){return d.item;});
  var r=await fetch('/api/admin/deductions?id='+encodeURIComponent(editId),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deds:deds})});
  if(r.ok){toast('扣分已儲存 ✓');var keep=editId;await load();if(subsById[keep])openDetail(keep);}else{toast('儲存失敗');}
}
async function saveReview(){
  var body={score:$("rvScore").value,good:$("rvGood").value,improve:$("rvImprove").value,comment:$("rvComment").value};
  var r=await fetch('/api/admin/review?id='+encodeURIComponent(editId),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var j=await r.json().catch(function(){return {};});
  if(j.ok){toast('評分/回饋已儲存 ✓');var keep=editId;await load();if(subsById[keep])openDetail(keep);}
  else if(j.locked){alert('⚠ '+(j.error||'已鎖定'));var k2=editId;await load();if(subsById[k2])openDetail(k2);}
  else{toast('儲存失敗');}
}
function fmtWhen(ms){var d=new Date(ms);return (d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0');}
function closeDetail(){$("detailModal").classList.remove("show");}
/* ===== 回報表範本編輯 ===== */
let tpl=null, tplDay='直播日', tplPos='', tplIp='微糖';
var TPL_IPS=['微糖','白姊','棠棠'];
function ensureTpl(){
  if(!tpl||typeof tpl!=='object'||Array.isArray(tpl))tpl={};
  ['直播日','非直播日'].forEach(function(day){
    if(!tpl[day]||typeof tpl[day]!=='object'||Array.isArray(tpl[day]))tpl[day]={};
    Object.keys(tpl[day]).forEach(function(role){
      var r=tpl[day][role];
      if(!r||typeof r!=='object'||Array.isArray(r)){ var arr=Array.isArray(r)?r:[]; tpl[day][role]={}; TPL_IPS.forEach(function(ip){tpl[day][role][ip]=JSON.parse(JSON.stringify(arr));}); }
      else { TPL_IPS.forEach(function(ip){ if(!Array.isArray(r[ip]))r[ip]=[]; }); }
    });
  });
}
async function openTplEditor(){
  try{ var r=await fetch('/api/template'); tpl=await r.json(); }catch(e){ tpl={}; }
  ensureTpl();
  tplDay='直播日'; var roles=tplRoles(); tplPos=roles[0]||''; tplIp='微糖';
  renderTpl(); $("tplModal").classList.add("show");
}
function closeTpl(){$("tplModal").classList.remove("show");}
function tplRoles(){return Object.keys(tpl[tplDay]||{});}
function curArr(){ if(!tpl[tplDay])tpl[tplDay]={}; if(!tpl[tplDay][tplPos])return []; if(!Array.isArray(tpl[tplDay][tplPos][tplIp]))tpl[tplDay][tplPos][tplIp]=[]; return tpl[tplDay][tplPos][tplIp]; }
function tplSetDay(d){tplDay=d;var roles=tplRoles();if(roles.indexOf(tplPos)<0)tplPos=roles[0]||'';renderTpl();}
function tplSetPos(p){tplPos=p;renderTpl();}
function tplSetIp(ip){tplIp=ip;renderTpl();}
function tplAddRole(){var n=(prompt('新增崗位名稱（例如：主持、控場、企劃）','')||'').trim();if(!n)return;if(tpl[tplDay][n]){alert('已有同名崗位');return;}tpl[tplDay][n]={};TPL_IPS.forEach(function(ip){tpl[tplDay][n][ip]=[];});tplPos=n;renderTpl();}
function tplRenameRole(){if(!tplPos)return;var n=(prompt('崗位改名為：',tplPos)||'').trim();if(!n||n===tplPos)return;if(tpl[tplDay][n]){alert('已有同名崗位');return;}tpl[tplDay][n]=tpl[tplDay][tplPos];delete tpl[tplDay][tplPos];tplPos=n;renderTpl();}
function tplDelRole(){if(!tplPos)return;if(!confirm('刪除「'+tplDay+'／'+tplPos+'」整個崗位（含三個 IP 清單）？'))return;delete tpl[tplDay][tplPos];tplPos=tplRoles()[0]||'';renderTpl();}
function tplCopyToIps(){var src=curArr();var tgt=TPL_IPS.filter(function(ip){return ip!==tplIp;});if(!confirm('把「'+tplPos+'／'+tplIp+'」的清單複製到 '+tgt.join('、')+'？（會覆蓋它們現有清單）'))return;tgt.forEach(function(ip){tpl[tplDay][tplPos][ip]=JSON.parse(JSON.stringify(src));});renderTpl();toast('已複製到 '+tgt.join('、'));}
function tplCopyToOtherDay(){if(!tplPos)return;var other=(tplDay==='直播日')?'非直播日':'直播日';if(!confirm('把「'+tplDay+'／'+tplPos+'」整個崗位（含三個 IP）複製到「'+other+'」？（會覆蓋該日別同名崗位）'))return;if(!tpl[other])tpl[other]={};tpl[other][tplPos]=JSON.parse(JSON.stringify(tpl[tplDay][tplPos]));toast('已複製到 '+other);}
function renderTpl(){
  var dayTabs=['直播日','非直播日'].map(function(d){return "<button class='tpltab"+(d===tplDay?' on':'')+"' onclick=\"tplSetDay('"+d+"')\">"+d+"</button>";}).join('');
  var roleTabs=tplRoles().map(function(p){return "<button class='tpltab"+(p===tplPos?' on':'')+"' onclick=\"tplSetPos('"+esc(p)+"')\">"+esc(p)+"</button>";}).join('');
  roleTabs+="<button class='tpltab add' onclick='tplAddRole()'>＋崗位</button>";
  var ipTabs=TPL_IPS.map(function(ip){var n=((tpl[tplDay][tplPos]||{})[ip]||[]).length;return "<button class='tpltab"+(ip===tplIp?' on':'')+"' onclick=\"tplSetIp('"+ip+"')\">"+ip+"（"+n+"）</button>";}).join('');
  var h="<div class='tplnav'><div class='tplnavrow'><span class='tplnavlbl'>日別</span>"+dayTabs+"</div>";
  h+="<div class='tplnavrow'><span class='tplnavlbl'>崗位</span>"+roleTabs;
  if(tplPos)h+="<button class='tpltab mini' onclick='tplRenameRole()'>改名</button><button class='tpltab mini rm' onclick='tplDelRole()'>刪除</button>";
  h+="</div>";
  if(tplPos)h+="<div class='tplnavrow'><span class='tplnavlbl'>IP</span>"+ipTabs+"</div>";
  h+="</div>";
  if(!tplPos){ h+="<div class='tplnote'>「"+tplDay+"」還沒有崗位，按上方「＋崗位」新增。直播日與非直播日的崗位可以完全不同。</div>"; $("tplBody").innerHTML=h; return; }
  h+="<div class='tplnote'>拖曳左上角 ⠿ 可排序（或用 ↑↓）。類型：<b>滑桿</b>＝0–100%、<b>狀態鈕</b>＝可各自選 完成／未完成、完成／部分／未完成、或再＋不適用、<b>數字</b>＝設一個達標門檻。「分類」相同會自動歸成同一段。目前編輯的是「<b>"+esc(tplDay)+"／"+esc(tplPos)+"／"+esc(tplIp)+"</b>」專屬清單。</div>";
  h+="<div class='tplr' style='margin-bottom:8px'><button class='btn ghost sm' onclick='tplCopyToIps()'>複製此清單到其他 IP</button><button class='btn ghost sm' onclick='tplCopyToOtherDay()'>複製此崗位到另一日別</button></div>";
  curArr().forEach(function(it,i){
    var d=it[3]; var isN=(d==='n'); var isT=(d==='t'); var thr=(typeof it[4]==='number')?it[4]:0; var curType=isN?'n':(isT?('t'+(Number(it[4])||4)):'s');
    h+="<div class='tplitem' ondragover='tplDragOver(event)' ondrop='tplDrop(event,"+i+")'>";
    h+="<div class='tplr'><span class='draghandle' draggable='true' ondragstart='tplDragStart(event,"+i+")' title='拖曳排序'>⠿</span>";
    h+="<input class='in' style='flex:1;min-width:110px' placeholder='分類（例：一、排期與規劃）' value=\""+esc(it[0]||'')+"\" oninput=\"tplUp("+i+",0,this.value)\">";
    h+="<select class='in' onchange=\"tplType("+i+",this.value)\">";[['s','滑桿'],['t2','完成／未完成'],['t3','完成／部分／未完成'],['t4','完成／部分／未完成／不適用'],['n','數字']].forEach(function(o){h+="<option value='"+o[0]+"'"+(curType===o[0]?' selected':'')+">"+o[1]+"</option>";});h+="</select></div>";
    h+="<textarea class='in tqa' placeholder='工作項目內容' oninput=\"tplUp("+i+",1,this.value)\">"+esc(it[1]||'')+"</textarea>";
    h+="<div class='tplr'><input class='in' style='flex:1;min-width:140px' placeholder='標準/門檻說明（顯示用）' value=\""+esc(it[2]||'')+"\" oninput=\"tplUp("+i+",2,this.value)\"></div>";
    if(isN){ h+="<div class='tplr tthr'>達標門檻（數字）<input class='in num' type='number' value='"+thr+"' oninput=\"tplThr("+i+",this.value)\"></div>"; }
    h+="<div class='tplact'><button onclick='tplMove("+i+",-1)'>↑</button><button onclick='tplMove("+i+",1)'>↓</button><button class='rm' onclick='tplDel("+i+")'>✕ 移除</button></div></div>";
  });
  h+="<div style='margin-top:10px'><button class='btn ghost' onclick='tplAdd()'>＋ 新增項目</button></div>";
  $("tplBody").innerHTML=h;
}
function tplUp(i,f,v){curArr()[i][f]=v;}
function tplThr(i,v){curArr()[i][4]=Number(v)||0;}
function tplType(i,v){var it=curArr()[i];var old=it[3];if(v.charAt(0)==='t'){it[3]='t';it[4]=Number(v.slice(1))||4;}else if(v==='n'){it[3]='n';if(old!=='n')it[4]=0;}else{it[3]='s';if(it.length>4)it.length=4;}renderTpl();}
function tplAdd(){var a=curArr();a.push([a.length?a[a.length-1][0]:'一、','','','s']);renderTpl();}
function tplDel(i){if(confirm('移除這個項目？')){curArr().splice(i,1);renderTpl();}}
function tplMove(i,d){var a=curArr(),j=i+d;if(j<0||j>=a.length)return;var t=a[i];a[i]=a[j];a[j]=t;renderTpl();}
var tplDragFrom=null;
function tplDragStart(e,i){tplDragFrom=i;e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text','')}catch(_){}}
function tplDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function tplDrop(e,i){e.preventDefault();if(tplDragFrom==null||tplDragFrom===i){tplDragFrom=null;return;}var a=curArr();var m=a.splice(tplDragFrom,1)[0];a.splice(i,0,m);tplDragFrom=null;renderTpl();}
async function saveTpl(){
  var r=await fetch('/api/admin/template',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(tpl)});
  if(r.ok){toast('回報表已儲存 ✓ 填寫頁重新整理即生效');}else{toast('儲存失敗');}
}
function exportCsv(){const m=$("fMonth").value;window.location='/api/admin/export?month='+encodeURIComponent(m);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

check();
</script>
